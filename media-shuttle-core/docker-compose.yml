services:
  core-worker:
    build:
      context: .
    restart: unless-stopped
    init: true
    environment:
      MEDIA_SHUTTLE_STORAGE_BACKEND: ${MEDIA_SHUTTLE_STORAGE_BACKEND:-mongo}
      MEDIA_SHUTTLE_QUEUE_BACKEND: ${MEDIA_SHUTTLE_QUEUE_BACKEND:-redis}
      MEDIA_SHUTTLE_REDIS_URL: ${MEDIA_SHUTTLE_REDIS_URL}
      MEDIA_SHUTTLE_MONGO_URI: ${MEDIA_SHUTTLE_MONGO_URI}
      MEDIA_SHUTTLE_MONGO_DB: ${MEDIA_SHUTTLE_MONGO_DB:-media_shuttle}
      MEDIA_SHUTTLE_MONGO_TASK_COLLECTION: ${MEDIA_SHUTTLE_MONGO_TASK_COLLECTION:-tasks}
      MEDIA_SHUTTLE_MONGO_WORKER_COLLECTION: ${MEDIA_SHUTTLE_MONGO_WORKER_COLLECTION:-workers}
      MEDIA_SHUTTLE_CREATED_QUEUE_KEY: ${MEDIA_SHUTTLE_CREATED_QUEUE_KEY:-media_shuttle:task_created}
      MEDIA_SHUTTLE_RETRY_QUEUE_KEY: ${MEDIA_SHUTTLE_RETRY_QUEUE_KEY:-media_shuttle:task_retry}
      MEDIA_SHUTTLE_DOWNLOAD_QUEUE_KEY: ${MEDIA_SHUTTLE_DOWNLOAD_QUEUE_KEY:-media_shuttle:task_download}
      MEDIA_SHUTTLE_UPLOAD_QUEUE_KEY: ${MEDIA_SHUTTLE_UPLOAD_QUEUE_KEY:-media_shuttle:task_upload}
      MEDIA_SHUTTLE_WORKER_CONTROL_QUEUE_KEY: ${MEDIA_SHUTTLE_WORKER_CONTROL_QUEUE_KEY:-media_shuttle:worker_control}
      MEDIA_SHUTTLE_SITE_QUEUE_SUFFIXES: ${MEDIA_SHUTTLE_SITE_QUEUE_SUFFIXES:-GOFILE,BUNKR,CYBERDROP,CYBERFILE,PIXELDRAIN,GD,MEGA,MEDIAFIRE,SAINT,COOMER,YTDL,GENERIC}
      MEDIA_SHUTTLE_UPLOAD_QUEUE_SUFFIXES: ${MEDIA_SHUTTLE_UPLOAD_QUEUE_SUFFIXES:-RCLONE}
      MEDIA_SHUTTLE_IO_MODE: ${MEDIA_SHUTTLE_IO_MODE:-live}
      MEDIA_SHUTTLE_GOFILE_TOKEN: ${MEDIA_SHUTTLE_GOFILE_TOKEN:-}
      MEDIA_SHUTTLE_TG_API_ID: ${MEDIA_SHUTTLE_TG_API_ID:-}
      MEDIA_SHUTTLE_TG_API_HASH: ${MEDIA_SHUTTLE_TG_API_HASH:-}
      MEDIA_SHUTTLE_TG_BOT_TOKEN: ${MEDIA_SHUTTLE_TG_BOT_TOKEN:-}
      MEDIA_SHUTTLE_TG_SESSION_NAME: ${MEDIA_SHUTTLE_TG_SESSION_NAME:-media-shuttle-core-uploader}
      MEDIA_SHUTTLE_TG_WORKDIR: /tmp/media-shuttle-tg
      MEDIA_SHUTTLE_CORE_LOG_DIR: /var/log/media-shuttle-core
      MEDIA_SHUTTLE_CORE_LOG_LEVEL: ${MEDIA_SHUTTLE_CORE_LOG_LEVEL:-INFO}
      MEDIA_SHUTTLE_CORE_LOG_RETENTION: ${MEDIA_SHUTTLE_CORE_LOG_RETENTION:-14 days}
      MEDIA_SHUTTLE_UPLOAD_AFFINITY: ${MEDIA_SHUTTLE_UPLOAD_AFFINITY:-1}
      MEDIA_SHUTTLE_NODE_ID: ${MEDIA_SHUTTLE_NODE_ID:-}
      MEDIA_SHUTTLE_MAX_RETRIES: ${MEDIA_SHUTTLE_MAX_RETRIES:-2}
      MEDIA_SHUTTLE_CORE_CONCURRENCY: ${MEDIA_SHUTTLE_CORE_CONCURRENCY:-1}
      MEDIA_SHUTTLE_CORE_WORKER_ROLE: ${MEDIA_SHUTTLE_CORE_WORKER_ROLE:-all}
      MEDIA_SHUTTLE_WORKER_REGISTRY_ENABLED: ${MEDIA_SHUTTLE_WORKER_REGISTRY_ENABLED:-1}
      MEDIA_SHUTTLE_CLEANUP_ON_UPLOAD_SUCCESS: ${MEDIA_SHUTTLE_CLEANUP_ON_UPLOAD_SUCCESS:-1}
      MEDIA_SHUTTLE_DOWNLOAD_DIR: /var/lib/media-shuttle/downloads
      MEDIA_SHUTTLE_EXTRA_PROVIDER_MODULES: ${MEDIA_SHUTTLE_EXTRA_PROVIDER_MODULES:-}
      MEDIA_SHUTTLE_EXTRA_PROVIDER_CONFIG: ${MEDIA_SHUTTLE_EXTRA_PROVIDER_CONFIG:-}
    volumes:
      - core-downloads:/var/lib/media-shuttle/downloads
      - core-logs:/var/log/media-shuttle-core
      - ./rclone:/root/.config/rclone:ro
      - tg-sessions:/tmp/media-shuttle-tg

volumes:
  core-downloads:
  core-logs:
  tg-sessions:
